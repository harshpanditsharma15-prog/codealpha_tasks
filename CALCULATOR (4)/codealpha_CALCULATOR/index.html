<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="calculator-shell" aria-label="Calculator">
    <section class="calculator" aria-label="Dark theme calculator">
      <div class="display" aria-live="polite">
        <div id="expression" class="expression" aria-label="Current expression">0</div>
        <div id="preview" class="preview" aria-label="Live result">0</div>
      </div>

      <div class="keypad">
        <button class="key key-muted" type="button" data-action="clear">AC</button>
        <button class="key key-muted" type="button" data-action="backspace" aria-label="Backspace">⌫</button>
        <button class="key key-operator" type="button" data-value="/">÷</button>
        <button class="key key-operator" type="button" data-value="*">×</button>

        <button class="key" type="button" data-value="7">7</button>
        <button class="key" type="button" data-value="8">8</button>
        <button class="key" type="button" data-value="9">9</button>
        <button class="key key-operator" type="button" data-value="-">−</button>

        <button class="key" type="button" data-value="4">4</button>
        <button class="key" type="button" data-value="5">5</button>
        <button class="key" type="button" data-value="6">6</button>
        <button class="key key-operator" type="button" data-value="+">+</button>

        <button class="key" type="button" data-value="1">1</button>
        <button class="key" type="button" data-value="2">2</button>
        <button class="key" type="button" data-value="3">3</button>
        <button class="key key-equals" type="button" data-action="equals">=</button>

        <button class="key key-zero" type="button" data-value="0">0</button>
        <button class="key" type="button" data-value=".">.</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
